# Optional BI-Overlay: Metabase fuer Dashboards und DQ-Visualisierung
#
# Nutzung:
#   docker compose -f docker-compose.yml -f docker-compose.bi.yml up -d
#
# Metabase: http://localhost:3000
# Login: admin@demo.com / admin2pistor
# PostgreSQL-Verbindung "Demo (Data Vault)" wird automatisch eingerichtet.
#
# DuckDB-Unterstuetzung: Community-Plugin wird automatisch heruntergeladen
#   Version pinnen: DUCKDB_DRIVER_VERSION im metabase-plugins-init Service anpassen
#   DuckDB-Dateien in ./duckdb/ ablegen → im Container unter /duckdb/ erreichbar
#   Verbindung in Metabase: Typ "DuckDB", Datenbankpfad z.B. /duckdb/meine.duckdb
#
# RAM-Bedarf: ca. 500-700 MB zusaetzlich

services:

  # Init-Container: laedt DuckDB Community-Plugin herunter (versioniert, nur bei Bedarf)
  metabase-plugins-init:
    image: curlimages/curl:8.12.1
    user: "0:0"
    volumes:
      - metabase-plugins:/plugins
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        DUCKDB_DRIVER_VERSION=1.4.4.0
        VERSION_FILE=/plugins/.duckdb-driver-version
        JAR=/plugins/duckdb.metabase-driver.jar
        if [ -f "$$VERSION_FILE" ] && [ "$$(cat $$VERSION_FILE)" = "$$DUCKDB_DRIVER_VERSION" ]; then
          echo "DuckDB driver $$DUCKDB_DRIVER_VERSION already present, skipping download"
        else
          echo "Downloading DuckDB Metabase driver $$DUCKDB_DRIVER_VERSION..."
          curl -fL -o "$$JAR" \
            "https://github.com/motherduckdb/metabase_duckdb_driver/releases/download/$$DUCKDB_DRIVER_VERSION/duckdb.metabase-driver.jar"
          echo "$$DUCKDB_DRIVER_VERSION" > "$$VERSION_FILE"
          echo "DuckDB driver $$DUCKDB_DRIVER_VERSION installed"
        fi
        chmod -R 777 /plugins
    networks: []

  metabase:
    build: ./metabase
    ports:
      - "3000:3000"
    environment:
      # Embedded H2 fuer Metabase-Metadaten (kein extra DB noetig im Demo)
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      # Config-File fuer Admin-User und DB-Verbindung
      MB_CONFIG_FILE_PATH: /metabase-config/metabase-config.yml
      # Plugins-Verzeichnis (DuckDB-Treiber aus Init-Container)
      MB_PLUGINS_DIR: /plugins
      # Java Heap begrenzen fuer RAM-sparenden Betrieb
      JAVA_OPTS: "-Xmx2048m"
    volumes:
      - metabase-data:/metabase-data
      - metabase-plugins:/plugins
      - ./metabase/metabase-config.yml:/metabase-config/metabase-config.yml:ro
      # Lokale DuckDB-Dateien: hier ablegen, in Metabase als /duckdb/<datei>.duckdb einbinden
      - ./duckdb:/duckdb
    depends_on:
      postgres:
        condition: service_healthy
      metabase-plugins-init:
        condition: service_completed_successfully
    restart: always
    networks:
      - demo-network

volumes:
  metabase-data:
  metabase-plugins:
