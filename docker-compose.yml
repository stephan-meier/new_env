services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./daten:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - demo-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    env_file: .env
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@demo.local || true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-network

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow api-server --port 9090
    env_file: .env
    ports:
      - "9090:9090"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/usr/app/dbt
      - ./daten:/data
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow dag-processor
    env_file: .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/usr/app/dbt
      - ./daten:/data
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow scheduler
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/usr/app/dbt
      - ./daten:/data
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  dbt-docs:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    environment:
      POSTGRES_HOST: postgres
    command: >
      sh -c "dbt deps && dbt docs generate --profiles-dir /usr/app/dbt && dbt docs serve --port 8081 --profiles-dir /usr/app/dbt"
    ports:
      - "8081:8081"
    volumes:
      - ./dbt_project:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-network

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-network

volumes:
  postgres-data:
  airflow-logs:

networks:
  demo-network:
    driver: bridge
