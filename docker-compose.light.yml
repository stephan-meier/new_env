# Lightweight-Variante: LocalExecutor statt CeleryExecutor
# Fuer Maschinen mit 8 GB RAM (spart ca. 600-800 MB gegenueber der Standard-Variante)
#
# Unterschiede zur Standard-Variante (docker-compose.yml):
#   - LocalExecutor statt CeleryExecutor (Tasks laufen im Scheduler-Prozess)
#   - Kein Redis (Celery Broker)
#   - Kein Celery Worker
#   - Kein Flower (Celery Monitoring)
#
# Nutzung:
#   docker compose -f docker-compose.light.yml up -d
#
# + BI (Metabase):
#   docker compose -f docker-compose.light.yml -f docker-compose.bi.yml up -d
#
# + MCP Gateway:
#   docker compose -f docker-compose.light.yml -f docker-compose.bi.yml -f docker-compose.mcp.yml up -d
#
# RAM-Schaetzung:
#   Core (Light):  ~6-7 GB
#   + Metabase:    ~7-8 GB
#   + MCP Gateway: ~8 GB

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://demo_user:demo_pass@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"
    # Connection fuer DAGs
    AIRFLOW_CONN_DEMO_POSTGRES: postgresql://demo_user:demo_pass@postgres:5432/demo
    # dbt profiles.yml nutzt POSTGRES_HOST
    POSTGRES_HOST: postgres
    # dbt-Logs ausserhalb Bind-Mount (Windows: chown wird ignoriert)
    DBT_LOG_PATH: /tmp/dbt_logs
    # Cosmos: Telemetrie-Propagation deaktiviert (bekannter Bug Cosmos <1.14)
    AIRFLOW__COSMOS__PROPAGATE_TELEMETRY: "False"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/config:/opt/airflow/config
    - ./dbt_project:/usr/app/dbt
    - ./daten:/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./daten:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - demo-network

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - demo-network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config} && \
        chown -R airflow:root /usr/app/dbt 2>/dev/null || true && \
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@demo.local || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "0:0"
    networks:
      - demo-network

  dbt-docs:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    environment:
      POSTGRES_HOST: postgres
      DBT_LOG_PATH: /tmp/dbt_logs
    command: >
      sh -c "dbt deps && dbt docs generate --profiles-dir /usr/app/dbt &&
             cd /usr/app/dbt/target && python -m http.server 8081 --bind 0.0.0.0"
    ports:
      - "8081:8081"
    volumes:
      - ./dbt_project:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - demo-network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@demo.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - demo-network

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    ports:
      - "8572:8501"
    volumes:
      - ./streamlit:/app
      - ./README.md:/README.md:ro
      - ./dbt_project/target:/usr/app/dbt/target:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - demo-network

volumes:
  postgres-data:
  airflow-logs:
  pgadmin-data:

networks:
  demo-network:
    driver: bridge
