version: 2

models:
  - name: mart_revenue_per_customer
    description: "Umsatz pro Kunde, aggregiert ueber alle Bestellungen"
    tests:
      # Plausible Anzahl Kunden (keine Duplikate durch Historisierung)
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 200
          config:
            tags: ["business-logic"]
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      # Umsatz muss positiv sein
      - name: total_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              config:
                tags: ["business-logic"]
      # Mindestens 1 Bestellung pro Kunde
      - name: total_orders
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              config:
                tags: ["business-logic"]

  - name: mart_order_overview
    description: "Bestelluebersicht mit Kunden-, Mitarbeiter- und Positionsdaten"
    tests:
      # Nach Delta-Load: mindestens 600 Bestellungen
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 600
          config:
            tags: ["business-logic"]
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: mart_product_sales
    description: "Produkt-Verkaufsstatistiken mit Umsatz und Marge"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      # Kein Produkt mit negativer Verkaufsmenge
      - name: total_quantity_sold
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              config:
                tags: ["business-logic"]
