version: 2

models:
  # Hubs
  - name: hub_customer
    description: "Hub fuer Kunden-Entitaet"
    tests:
      # 100% unique Business Keys - keine Duplikate im Hub
      - dbt_expectations.expect_column_proportion_of_unique_values_to_be_between:
          column_name: customer_id
          min_value: 1.0
          max_value: 1.0
          config:
            tags: ["vault-integrity"]
    columns:
      - name: customer_hk
        tests:
          - unique
          - not_null

  - name: hub_employee
    description: "Hub fuer Mitarbeiter-Entitaet"
    columns:
      - name: employee_hk
        tests:
          - unique
          - not_null

  - name: hub_product
    description: "Hub fuer Produkt-Entitaet"
    columns:
      - name: product_hk
        tests:
          - unique
          - not_null

  - name: hub_order
    description: "Hub fuer Bestell-Entitaet"
    tests:
      - dbt_expectations.expect_column_proportion_of_unique_values_to_be_between:
          column_name: order_id
          min_value: 1.0
          max_value: 1.0
          config:
            tags: ["vault-integrity"]
    columns:
      - name: order_hk
        tests:
          - unique
          - not_null

  # Links
  - name: lnk_order_customer
    description: "Link zwischen Bestellung und Kunde"
    tests:
      # Jede Order-Customer Kombination exakt einmal
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["order_hk", "customer_hk"]
          config:
            tags: ["vault-integrity"]
    columns:
      - name: order_customer_hk
        tests:
          - unique
          - not_null

  - name: lnk_order_employee
    description: "Link zwischen Bestellung und Mitarbeiter"
    columns:
      - name: order_employee_hk
        tests:
          - unique
          - not_null

  - name: lnk_order_product
    description: "Link zwischen Bestellung und Produkt (aus Bestellpositionen)"
    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["order_hk", "product_hk"]
          config:
            tags: ["vault-integrity"]
    columns:
      - name: order_product_hk
        tests:
          - unique
          - not_null

  # Satellites
  - name: sat_customer
    description: "Satellite mit Kunden-Attributen"
    tests:
      # Proportion < 1.0 = Historisierung vorhanden (Duplikate auf HK)
      - dbt_expectations.expect_column_proportion_of_unique_values_to_be_between:
          column_name: customer_hk
          min_value: 0.5
          max_value: 1.0
          config:
            tags: ["vault-integrity"]
    columns:
      # Frische Daten: nach Delta-Load muessen Eintraege aus 2024 existieren
      - name: load_datetime
        tests:
          - dbt_expectations.expect_row_values_to_have_recent_data:
              datepart: year
              interval: 3
              config:
                tags: ["freshness"]

  - name: sat_employee
    description: "Satellite mit Mitarbeiter-Attributen"
  - name: sat_product
    description: "Satellite mit Produkt-Attributen"

  - name: sat_order
    description: "Satellite mit Bestell-Attributen"
    columns:
      - name: load_datetime
        tests:
          - dbt_expectations.expect_row_values_to_have_recent_data:
              datepart: year
              interval: 3
              config:
                tags: ["freshness"]

  - name: sat_order_detail
    description: "Satellite mit Bestellpositions-Attributen"

  # PIT
  - name: pit_customer
    description: "Point-in-Time Tabelle fuer Kunden"
  - name: pit_order
    description: "Point-in-Time Tabelle fuer Bestellungen"
